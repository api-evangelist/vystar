name: VyStar Credit Union
kind: company
description: >-
  VyStar Credit Union is a member-owned, not-for-profit financial cooperative
  headquartered in Jacksonville, Florida. Founded in 1952 as Jax Navy Federal
  Credit Union to serve military members at Naval Air Station Jacksonville and
  renamed VyStar in 2002, it is one of the largest credit unions in the United
  States, with roughly $14 billion in assets, more than 950,000 members, and
  approximately 80 branches across Florida and Georgia. It is state-chartered
  and federally insured by the NCUA. Like most US credit unions, VyStar
  publishes no public, first-party developer API program: there is no live
  developer portal, no downloadable OpenAPI or Swagger definition, and no
  documented first-party data-access API. Consumer-permissioned account data is
  shared with third parties through financial-data aggregators rather than a
  documented open API, and the United States has no single mandated
  open-banking contract. VyStar's open-finance posture is therefore
  aggregator-mediated, with the emerging CFPB Section 1033 Personal Financial
  Data Rights rule as the relevant regulatory horizon.
